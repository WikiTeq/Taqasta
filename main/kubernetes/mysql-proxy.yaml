apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: mysql-proxy-ingress
spec:
  entryPoints:
    - mysql
  routes:
    #- match: HostSNI(`*`)
    - match: HostSNI(`8e4a795832c41ea2e77f24253d8a385a-taqasta.mysql.teq.wiki`)
      services:
        - name: mysql-service
          port: 3306
  tls:
    secretName: mysql-proxy-ingress-cert-secret
---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: mysql-proxy-dns
spec:
  endpoints:
    - dnsName: 8e4a795832c41ea2e77f24253d8a385a-taqasta.mysql.teq.wiki
      recordTTL: 60
      recordType: A
      targets:
        # cluster LB public IP address
        - 147.135.76.229
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mysql-proxy-ingress-cert-secret
spec:
  secretName: mysql-proxy-ingress-cert-secret
  dnsNames:
    - 8e4a795832c41ea2e77f24253d8a385a-taqasta.mysql.teq.wiki
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
